 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trustcard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    .btn:hover {
      background: #16a34a;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<header>Trustcard 💳</header>

<div class="container">

  <div class="card">
    <h3>Sell Gift Card</h3>
    <input type="text" placeholder="Card Type (Amazon, iTunes)">
    <input type="number" placeholder="Amount ($)">
    <button class="btn">Sell Now</button>
  </div>

  <div class="card">
    <h3>Buy Gift Card</h3>
    <input type="text" placeholder="Card Type">
    <input type="number" placeholder="Amount">
    <button class="btn">Buy Now</button>
  </div>

  <div class="card">
    <h3>Wallet Balance</h3>
    <p>₦0.00</p>
  </div>

</div>

</body>
</html>
